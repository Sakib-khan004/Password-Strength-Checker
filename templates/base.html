<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SecurePass{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="{{ url_for('index') }}" class="brand text-decoration-none">🔐 Secure<span>Pass</span></a>
      <div>
        <a href="{{ url_for('index') }}" class="nav-link-custom">Analyzer</a>
        {% if session.get('logged_in') %}
          <a href="{{ url_for('dashboard') }}" class="nav-link-custom">Dashboard</a>
          <a href="{{ url_for('logout') }}" class="nav-link-custom">Logout</a>
        {% else %}
          <a href="{{ url_for('login') }}" class="nav-link-custom">Admin Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="footer-custom">
    SecurePass &mdash; AI Inspired Password Strength Analyzer &copy; 2026
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
